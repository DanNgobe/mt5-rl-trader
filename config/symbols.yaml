    max_lot: 100.0
    contract_size: 100000
    margin_requirement: 0.01

  EURCHF:
    description: "Euro / Swiss Franc"
    pip_value: 0.0001
    pip_location: 4
    typical_spread_pips: 1.5
    min_lot: 0.01
    max_lot: 100.0
    contract_size: 100000
    margin_requirement: 0.01

  AUDJPY:
    description: "Australian Dollar / Japanese Yen"
    pip_value: 0.01
    pip_location: 2
    typical_spread_pips: 2.0
    min_lot: 0.01
    max_lot: 100.0
    contract_size: 100000
