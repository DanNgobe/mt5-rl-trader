# Default symbol for training
# ===========================
default_symbol: EURUSD


# Symbol Groups
# =============
groups:
  majors:
    - EURUSD
    - GBPUSD
    - USDJPY
    - USDCHF
    - AUDUSD
    - USDCAD
    - NZDUSD

  crosses:
    - EURGBP
    - EURJPY
    - GBPJPY
    - EURCHF
    - AUDJPY

  usd_pairs:
    - EURUSD
    - GBPUSD
    - USDJPY
    - USDCHF
    - AUDUSD
    - USDCAD
    - NZDUSD
