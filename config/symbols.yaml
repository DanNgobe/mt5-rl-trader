# Forex Pair Configurations
# =========================
# Fields read by load_symbol_spec:
#   pip_value, pip_location, contract_size, typical_spread_pips,
#   min_lot, max_lot, margin_requirement

symbols:
  # Major Pairs
  # -----------

  EURUSD:
    description: "Euro / US Dollar"
    pip_value: 0.0001
    pip_location: 4
    typical_spread_pips: 0.8
    min_lot: 0.01
    max_lot: 100.0
    contract_size: 100000
    margin_requirement: 0.01

  GBPUSD:
    description: "British Pound / US Dollar"
    pip_value: 0.0001
    pip_location: 4
    typical_spread_pips: 1.2
