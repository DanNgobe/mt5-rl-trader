    margin_requirement: 0.01

  # Minor/Cross Pairs
  # -----------------

  EURGBP:
    description: "Euro / British Pound"
    pip_value: 0.0001
    pip_location: 4
    typical_spread_pips: 1.5
    min_lot: 0.01
