# Trading Environment Configuration
# ==================================

environment:
  # Initial account balance
  initial_balance: 1000.0

  # Trade simulator settings
  spread: 0.0001                     # 1 pip for EURUSD
  slippage_prob: 0.3                 # range: [0.1, 0.5] — higher = more realistic, harder to train
  slippage_range: [0.00001, 0.0005]  # range: [0.00001, 0.001] — upper bound is ~10 pips

  # Hard cap on simultaneous open positions
  # range: [1, 5] — more positions = richer hedging but larger obs space and harder credit assignment
  max_positions: 3

  # Episode termination: equity drawdown fraction that triggers margin call
  # range: [0.2, 0.5] — tighter = more episodes, looser = agent can dig deeper holes
  max_drawdown_pct: 0.5

  # Training episode window length in bars. A random start index is chosen each reset()
  # so the agent sees different slices of the dataset. Shorter = faster credit assignment.
  # Set to null to use the full dataset (evaluation behaviour).
  # range: [200, 1000] for H1 data — 500 ≈ 3 weeks of bars
  episode_length: 500

  # Whether to randomise the episode start index each reset (training only).
  # Evaluator always uses random_start: false to run the full dataset.
  random_start: true


# Data Configuration
# ==================
data:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  columns: [open, high, low, close, volume]
  timeframe: H1  # H1, H4, D1, etc.

  # Bars per year for Sharpe annualisation.
  # M1=378000  M5=75600  M15=25200  M30=12600  H1=6048  H4=1512  D1=252  W1=52
  bars_per_year: 6048


# Reward Configuration
# =====================
reward:
  # Penalty for illegal actions (open at max_positions, close with no matching position).
  # Should sit between a typical small win and a typical small loss in pnl/ib terms.
  # At 0.01 lot / 10k balance: 10-pip win ≈ 0.0001, 50-pip win ≈ 0.0005.
  # range: [0.0001, 0.005] — too high biases toward never trading
  invalid_action_penalty: 0.001

  # Penalty for close actions where the direction is correct but lot tier doesn't match
  # any open position. Agent intent is right — this is a soft nudge to pick the right tier.
  # Should be well below invalid_action_penalty so closing is never "dangerous" to attempt.
  # range: [0.00005, 0.0003]
  wrong_lot_penalty: 0.0002

  # Per-step cost per lot held. Discourages holding losers and overtrading.
  # At 0.01 lot this costs 0.000001/step — a 100-bar trade costs 0.0001 total.
  # range: [0.00005, 0.0005] — scale up if agent holds too long, down if it exits too early
  holding_cost_per_lot: 0.0001

  # Per-step penalty when flat (no open positions). Nudges agent to engage.
  # Keep at 0.0 initially — only enable if agent learns to sit flat all episode.
  # range: [0.0, 0.00005]
  flat_penalty_per_step: 0.00001

  # Spread cost multiplier on open. 2.0 = full round-trip charged upfront.
  # range: [1.0, 2.0] — 1.0 charges only the open leg, 2.0 is most conservative
  spread_cost_scale: 2.0


# Observation Configuration
# =========================
observation:
  # Sparse lag indices (bars back). Exponential spacing gives multi-scale price context.
  # range: any subset of [1,2,4,8,16,24,48] — more lags = richer history, larger obs
  price_lags: [1, 2, 4, 8, 24]

  indicators:
    rsi:
      enabled: true
      period: 14        # range: [7, 21] — shorter = noisier, longer = smoother

    atr:
      enabled: true
      period: 14        # range: [7, 21]

    ema_ratio:
      enabled: true
      fast: 8           # range: [5, 12]
      slow: 21          # range: [18, 50] — keep slow > 2x fast

    bollinger:
      enabled: true
      period: 20        # range: [10, 30]
      std_dev: 2.0      # range: [1.5, 2.5]

    momentum:
      enabled: true
      periods: [5, 20, 50]   # range: any 2–4 values spanning short/medium/long term

    session:
      enabled: true     # hour_sin, hour_cos, dow_sin, dow_cos — free 4 features, keep on


# Preprocessing
# =============
preprocessing:
  price_method: log_return   # log_return | relative | zscore
  volume_method: log         # log | minmax | zscore


# PPO Agent Hyperparameters
# =========================
agent:
  algorithm: PPO
  policy: MlpPolicy

  # Network architecture. Scale up if obs space grows significantly.
  # range: [64,64] to [256,256] — deeper rarely helps for tabular obs
  policy_kwargs:
    net_arch:
      - 128
      - 128

  # Learning rate. With VecNormalize active you can afford slightly higher.
  # range: [0.00005, 0.001] — anneal if training is unstable
  learning_rate: 0.0003

  # Steps per env per update. Larger = more stable gradient estimates.
  # range: [512, 4096] — increase if episodes are long (>1000 steps)
  n_steps: 2048

  # Minibatch size. Must divide n_steps * n_envs evenly.
  # range: [64, 512]
  batch_size: 128

  # Gradient update passes per rollout.
  # range: [5, 20] — more epochs risks overfitting the rollout buffer
  n_epochs: 10

  # Discount factor. High because forex rewards are sparse and long-horizon.
  # range: [0.95, 0.999] — lower if episodes are short (<200 steps)
  gamma: 0.98

  # GAE lambda. Controls bias/variance tradeoff in advantage estimation.
  # range: [0.9, 0.99]
  gae_lambda: 0.95

  # PPO clip range. Standard value — widen slightly if policy changes too slowly.
  # range: [0.1, 0.3]
  clip_range: 0.2

  # Entropy coefficient. Encourages exploration — important early in training.
  # range: [0.001, 0.05] — reduce if policy collapses to one action
  ent_coef: 0.01

  # Value function loss coefficient.
  # range: [0.25, 1.0]
  vf_coef: 0.5

  # Gradient clipping. Prevents exploding gradients.
  # range: [0.3, 1.0]
  max_grad_norm: 0.5

  clip_range_vf: null      # null = no VF clipping; set to 0.2 if value loss spikes
  normalize_advantage: true
  target_kl: 0.02          # range: [0.01, 0.05] — null to disable early stopping


# Training Configuration
# ======================
training:
  # Sparse rewards need more timesteps than dense-reward envs.
  # range: [500k, 5M] depending on episode length and n_envs
  total_timesteps: 2000000

  seed: 42
  log_dir: logs
  model_dir: models

  # Checkpoint every N timesteps.
  # range: [50000, 200000]
  save_freq: 100000

  # Eval every N timesteps. 0 to disable.
  # range: [25000, 100000]
  eval_freq: 50000

  n_eval_episodes: 10   # range: [5, 20] — more = stable eval metric
  verbose: 1


# Evaluation Configuration
# ========================
evaluation:
  n_episodes: 100
  render: false
  save_results: true
  results_dir: data/evaluation
